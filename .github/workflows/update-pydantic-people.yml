name: Pydantic people update

on:
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  pydantic-people:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/people
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
