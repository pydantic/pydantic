name: Build PGO wheel
description: Builds a PGO-optimized wheel
inputs:
  interpreter:
    description: 'Interpreter to build the wheel for'
    required: true
  rust-toolchain:
    description: 'Rust toolchain to use'
    required: true
  working-directory:
    description: 'Working directory to run the action in'
    required: false
    default: ${{ github.workspace }}
outputs:
  wheel:
    description: 'Path to the built wheel'
    value: ${{ steps.find_wheel.outputs.path }}
runs:
  using: composite
  steps:
    - name: Build PGO-optimized wheel
      uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
      with:
        working-directory: ${{ inputs.working-directory }}
        manylinux: auto
        # `uv` is needed for the maturin `pgo-command` to use it
        before-script-linux: |
          curl -LsSf https://astral.sh/uv/install.sh | env UV_UNMANAGED_INSTALL=/usr/local/bin sh
        args: >
          --release
          --pgo
          --out dist
          --interpreter ${{ inputs.interpreter }}
        rust-toolchain: ${{ inputs.rust-toolchain }}
        docker-options: -e CI -e UV_PYTHON

    - name: Find built wheel
      id: find_wheel
      working-directory: ${{ inputs.working-directory }}
      run: echo "path=$(ls dist/*.whl)" | tee -a "$GITHUB_OUTPUT"
      shell: bash
